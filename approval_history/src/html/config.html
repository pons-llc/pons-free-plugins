<section class="settings">
  <h2 class="settings-heading">決裁者稟議者記録プラグイン 設定</h2>
  <p class="kintoneplugin-desc">
    プロセス管理のアクションボタンが押されるたびに、実行前後のステータス・実行ユーザー・役職・実行日時を
    サブテーブルへ自動で記録します。このサブテーブルは、保存ボタンを押すだけで自動的に作成されます
    (手動でのフィールド作成は不要です)。作成後は一覧画面・レコード作成画面・レコード編集画面の
    いずれからも編集できなくなります。
  </p>

  <form class="js-submit-settings">
    <section class="ahp-section">
      <div class="ahp-section-heading">プロセス管理の状態</div>
      <p class="ahp-warning" id="js-process-warning" style="display: none;">
        このアプリはプロセス管理が無効になっています。決裁履歴を記録するには、アプリの設定でプロセス管理を有効にしてください。
      </p>
      <p class="ahp-status" id="js-process-status"></p>
    </section>

    <section class="ahp-section">
      <div class="ahp-section-heading">決裁履歴テーブル</div>
      <p class="ahp-status" id="js-table-status"></p>
      <p class="ahp-field-list" id="js-field-list"></p>
      <p class="ahp-warning" id="js-table-warning" style="display: none;"></p>
    </section>

    <p class="js-errors kintoneplugin-alert" id="js-errors"></p>
    <p class="kintoneplugin-desc" id="js-progress"></p>

    <p class="kintoneplugin-row">
      <button type="button" class="js-cancel-button kintoneplugin-button-dialog-cancel">Cancel</button>
      <button class="js-save-button kintoneplugin-button-dialog-ok">Save</button>
    </p>
  </form>
</section>

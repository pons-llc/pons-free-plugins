<section>
  <div class="description">
    <P>「条件フィールド追加」ボタンを押して、非表示条件を作成してください。</P>
    <p>その後、「条件値を追加」ボタンを押し、条件となる値と非表示対象とするフィールドを選択してください。</p>
    <p>条件値は単数選択、非表示対象とするフィールドは複数選択です。</p>
    <p>複数選択の際は、Ctrlボタンを押しながら選択してください。Macの方はcommandボタンです。</p>
    <p>※複数の条件で非表示で同じ非表示対象フィールドを設定した場合は、うまく動作しませんのでご了承ください。</p>
    <a href="https://sites.google.com/pons-llc.com/kintone/%E3%83%9B%E3%83%BC%E3%83%A0">設定方法・お問い合わせはこちら</a>
  </div>
  <div id="form-container">
    <button id="addCondition" class="kintoneplugin-button-normal">条件フィールド追加</button>
  </div>
  <br>
  <button id="generateJSON" class="kintoneplugin-button-dialog-ok">設定を保存</button>
  <button id="cancel" class="kintoneplugin-button-normal">キャンセル</button>
</section>
